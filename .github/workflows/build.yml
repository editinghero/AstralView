name: Build AstralView

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Publish (Self-Contained)
        # Using 'dotnet publish' is the best way to gather all dependencies for a Self-Contained app
        run: dotnet publish AstralView.csproj -c Release -r win-x64 --self-contained true -p:WindowsPackageType=None -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralView-win-x64
          path: publish/
          if-no-files-found: error
