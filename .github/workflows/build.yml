name: Build AstralView

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build (x64 Release)
        run: msbuild AstralView.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:RestorePackages=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralView-win-x64
          path: bin/x64/Release/net8.0-windows10.0.26100.0/win-x64/
          if-no-files-found: warn
