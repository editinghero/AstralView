name: Build AstralView

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore AstralView.csproj

      - name: Build with MSBuild
        run: msbuild AstralView.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true /restore

      - name: Copy output to publish folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish
          Copy-Item -Path "bin\x64\Release\net8.0-windows10.0.19041.0\win-x64\*" -Destination publish -Recurse -Force

      - name: Copy Tools to Publish Directory
        shell: cmd
        run: |
          if not exist publish\Tools mkdir publish\Tools
          xcopy /E /I /Y Tools publish\Tools

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralView-win-x64
          path: publish/
          if-no-files-found: error
