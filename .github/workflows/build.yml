name: Build AstralView

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build and Publish (Self-Contained)
        # Using msbuild for maximum reliability with XAML and PRI generation
        run: msbuild AstralView.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:PublishSingleFile=false /p:WindowsPackageType=None /p:OutputPath=publish/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralView-win-x64
          path: publish/x64/
          if-no-files-found: error
