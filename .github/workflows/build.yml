name: Build AstralView

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore AstralView.csproj

      - name: Publish Self-Contained
        run: dotnet publish AstralView.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish

      - name: Copy Tools to Publish Directory
        shell: cmd
        run: |
          if not exist publish\Tools mkdir publish\Tools
          xcopy /E /I /Y Tools publish\Tools

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralView-win-x64
          path: publish/
          if-no-files-found: error
